name: Release Ports

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update all ports'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    paths:
      - 'docs/ports.json'

concurrency:
  group: release-ports
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare environment
        run: mkdir -p temp_ports docs

      # ------------------------------------------------------
      # Determine which ports need to be zipped and generate ports.json
      - name: Process ports and generate ports.json
        id: processports
        run: |
          set -e
          ZIP_DIR="$GITHUB_WORKSPACE/temp_ports"
          PORTS_JSON="$GITHUB_WORKSPACE/docs/ports.json"
          echo "[]" > "$PORTS_JSON"

          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force update: including all ports"
            mapfile -t PORTS_ARRAY < <(find ports/released -type f -name "*.sh" -exec dirname {} \;)
          else
            echo "Detecting ports changed in last commit"
            mapfile -t changed_files < <(git diff --name-only HEAD~1 HEAD)
            PORTS_ARRAY=()
            for f in "${changed_files[@]}"; do
              if [[ "$f" == ports/released/* ]]; then
                PORTS_ARRAY+=("$(dirname "$f")")
              fi
            done
          fi

          # Remove duplicate directories
          mapfile -t PORTS_ARRAY < <(printf "%s\n" "${PORTS_ARRAY[@]}" | sort -u)

          for PORTDIR in "${PORTS_ARRAY[@]}"; do
            PORTNAME=$(basename "$PORTDIR")
            echo "→ Processing $PORTNAME"

            # Inner folder containing port data
            INNER=$(find "$PORTDIR" -mindepth 1 -maxdepth 1 -type d | head -n1)
            if [ ! -d "$INNER" ]; then
              echo "  Skipping $PORTNAME: no inner folder"
              continue
            fi

            # Must contain port.json
            if [ ! -f "$INNER/port.json" ]; then
              echo "  Skipping $PORTNAME: missing port.json"
              continue
            fi

            # Must contain a screenshot
            SCREENSHOT=$(find "$INNER" -maxdepth 1 -type f \( -iname "screenshot*.png" -o -iname "screenshot*.jpg" -o -iname "screenshot*.jpeg" \) | head -n1)
            if [ ! -f "$SCREENSHOT" ]; then
              echo "  Skipping $PORTNAME: no screenshot found"
              continue
            fi

            # ------------------------------------------------------
            # Zip inner folder contents
            echo "  📦 Zipping port → $ZIP_DIR/${PORTNAME}.zip"
            (
              cd "$INNER"
              zip -r -q "$ZIP_DIR/${PORTNAME}.zip" .
            )

            ZIP_PATH="$ZIP_DIR/${PORTNAME}.zip"
            MD5=$(md5sum "$ZIP_PATH" | awk '{print $1}')
            SIZE=$(stat -c %s "$ZIP_PATH")
            DATE_UPDATED=$(date -u +"%Y-%m-%d")
            SCREENSHOT_REL="${SCREENSHOT#$GITHUB_WORKSPACE/}"
            SCREENSHOT_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/$SCREENSHOT_REL"

            PORT_JSON=$(jq -n \
              --arg name "$PORTNAME" \
              --arg date_updated "$DATE_UPDATED" \
              --arg download_url "https://github.com/${GITHUB_REPOSITORY}/releases/download/ports-latest/${PORTNAME}.zip" \
              --arg screenshot_url "$SCREENSHOT_URL" \
              --arg size "$SIZE" \
              --arg md5 "$MD5" \
              '{
                name: $name,
                source: {
                  date_updated: $date_updated,
                  download_url: $download_url,
                  screenshot_url: $screenshot_url,
                  size: ($size|tonumber),
                  md5: $md5
                }
              }'
            )

            TMP=$(mktemp)
            jq ". + [$PORT_JSON]" "$PORTS_JSON" > "$TMP" && mv "$TMP" "$PORTS_JSON"
          done

          echo "Generated ports.json with $(jq length "$PORTS_JSON") ports."
          echo "changed=true" >> $GITHUB_OUTPUT

      # ------------------------------------------------------
      # Upload zip files to GitHub release if any were created
      - name: Upload to release
        if: steps.processports.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ports-latest
          name: Ports
          overwrite_files: true
          generate_release_notes: false
          files: temp_ports/*.zip

      # ------------------------------------------------------
      # Commit ports.json
      - name: Commit ports.json
        if: steps.processports.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ports.json
          git commit -m "Update ports.json"
          git push

      # ------------------------------------------------------
      # Cleanup temporary files
      - name: Cleanup
        if: always()
        run: rm -rf temp_ports