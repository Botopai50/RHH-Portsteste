name: Release Ports

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update all ports'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    paths:
      - 'docs/ports.json'

concurrency:
  group: release-ports
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zip jq

      - name: Prepare environment
        run: |
          ZIP_DIR="$GITHUB_WORKSPACE/temp_ports"
          mkdir -p "$ZIP_DIR"
          PORTS_JSON="$GITHUB_WORKSPACE/docs/ports.json"
          echo "[]" > "$PORTS_JSON"

      - name: Determine ports to process
        id: ports
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            mapfile -t PORTS < <(find ports/released -type f -name "*.sh" -exec dirname {} \;)
          else
            mapfile -t CHANGED < <(git diff --name-only HEAD~1 HEAD)
            PORTS=()
            for f in "${CHANGED[@]}"; do
              if [[ "$f" == ports/released/* ]]; then
                PORTS+=("$(dirname "$f")")
              fi
            done
          fi
          mapfile -t PORTS < <(printf "%s\n" "${PORTS[@]}" | sort -u)
          echo "Ports=${PORTS[*]}" >> $GITHUB_OUTPUT

      - name: Process ports
        run: |
          ZIP_DIR="$GITHUB_WORKSPACE/temp_ports"
          PORTS_JSON="$GITHUB_WORKSPACE/docs/ports.json"
          for STAGING_DIR in ${{ steps.ports.outputs.Ports }}; do
            PORTNAME=$(basename "$STAGING_DIR")
            echo "→ Processing $PORTNAME"

            # Find inner folder
            PORTDIR=$(find "$STAGING_DIR" -mindepth 1 -maxdepth 1 -type d | head -n1)
            [ -d "$PORTDIR" ] || { echo "  Skipping $PORTNAME: no inner folder"; continue; }
            [ -f "$PORTDIR/port.json" ] || { echo "  Skipping $PORTNAME: missing port.json"; continue; }

            # Find screenshot
            SCREENSHOT=$(find "$PORTDIR" -maxdepth 1 -type f \( -iname "screenshot*.png" -o -iname "screenshot*.jpg" -o -iname "screenshot*.jpeg" \) | head -n1)
            [ -f "$SCREENSHOT" ] || { echo "  Skipping $PORTNAME: no screenshot found"; continue; }

            # Zip entire port folder
            echo "  📦 Zipping port → $ZIP_DIR/${PORTNAME}.zip"
            (cd "$STAGING_DIR" && zip -r -q "$ZIP_DIR/${PORTNAME}.zip" .)

            # Compute MD5 and size
            ZIP_PATH="$ZIP_DIR/${PORTNAME}.zip"
            MD5=$(md5sum "$ZIP_PATH" | awk '{print $1}')
            SIZE=$(stat -c %s "$ZIP_PATH")
            DATE_UPDATED=$(date -u +"%Y-%m-%d")
            SCREENSHOT_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/${SCREENSHOT#"$GITHUB_WORKSPACE/"}"
            DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/ports-latest/${PORTNAME}.zip"

            # Read original port.json
            ORIGINAL_JSON=$(cat "$PORTDIR/port.json")

            # Merge port.json with source at bottom
            PORT_JSON=$(jq -n \
              --argjson original "$ORIGINAL_JSON" \
              --arg date_updated "$DATE_UPDATED" \
              --arg download_url "$DOWNLOAD_URL" \
              --arg screenshot_url "$SCREENSHOT_URL" \
              --arg size "$SIZE" \
              --arg md5 "$MD5" \
              '$original + {source: {date_updated: $date_updated, download_url: $download_url, screenshot_url: $screenshot_url, size: ($size|tonumber), md5: $md5}}'
            )

            # Append to ports.json
            TMP=$(mktemp)
            jq ". + [$PORT_JSON]" "$PORTS_JSON" > "$TMP" && mv "$TMP" "$PORTS_JSON"
          done

      - name: Sort ports by title
        run: |
          PORTS_JSON="$GITHUB_WORKSPACE/docs/ports.json"
          TMP=$(mktemp)
          jq 'sort_by(.attr.title)' "$PORTS_JSON" > "$TMP" && mv "$TMP" "$PORTS_JSON"

      - name: Create release and upload zips
        if: ${{ steps.ports.outputs.Ports != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ports-latest
          name: Ports
          overwrite_files: true
          generate_release_notes: false
          files: temp_ports/*.zip

      - name: Commit ports.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add docs/ports.json
          git commit -m "Update ports.json"
          git push

      - name: Cleanup
        if: always()
        run: rm -rf temp_ports