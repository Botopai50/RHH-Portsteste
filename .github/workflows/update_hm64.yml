name: Update HM64 Port

on:
  repository_dispatch:
    types: [hm64_update]

permissions:
  contents: write

jobs:
  sync-port:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Variables
        run: |
          set -euo pipefail

          echo "ZIP_URL=${{ github.event.client_payload.zip_url }}" >> $GITHUB_ENV
          echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_ENV

          URL="${{ github.event.client_payload.zip_url }}"
          FILE=$(basename "$URL")
          echo "PORT_NAME=${FILE%.*}" >> $GITHUB_ENV

      - name: Download and Overwrite
        run: |
          set -euo pipefail

          BASE_DIR="ports/released/harbourmasters64"
          TARGET_DIR="$BASE_DIR/$PORT_NAME"

          mkdir -p "$TARGET_DIR"

          curl -L -o temp_port.zip "$ZIP_URL"

          mkdir -p tmp_extract
          unzip -o temp_port.zip -d tmp_extract

          rsync -a --delete tmp_extract/ "$TARGET_DIR/"

          rm -rf tmp_extract temp_port.zip

          # Remove source directories if present
          rm -rf "$TARGET_DIR/src"

      - name: Commit Changes
        run: |
          set -euo pipefail

          RAW_NAME="${PORT_NAME}"
          UPPER_NAME="${RAW_NAME^^}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[$UPPER_NAME] Update to $VERSION"
            git push
          fi