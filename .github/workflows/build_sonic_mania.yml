name: Build Sonic Mania

on:
  workflow_dispatch:
    inputs:
      force-build:
        description: "Force build (bypass SHA check, upload as workflow artifact only)"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '30 4 * * *'

permissions:
  contents: write

concurrency:
  group: build-sonic-mania
  cancel-in-progress: false

env:
  PORT_DIR: buildtools/sonic-mania/sonic-mania
  TARGET_DIR: ports/released/sonic-collection/sonic.mania/sonic.mania
  UPSTREAM_REPO: RSDKModding/Sonic-Mania-Decompilation
  UPSTREAM_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream HEAD commit
        run: |
          upstream_sha=$(curl -sf \
            "https://api.github.com/repos/${UPSTREAM_REPO}/commits/${UPSTREAM_BRANCH}" \
            | jq -r .sha)
          if [[ -z "$upstream_sha" || "$upstream_sha" == "null" ]]; then
            echo "Failed to fetch upstream SHA"
            exit 1
          fi
          echo "UPSTREAM_SHA=$upstream_sha" >> $GITHUB_ENV
          echo "UPSTREAM_SHORT=${upstream_sha:0:7}" >> $GITHUB_ENV

      - name: Fetch last built commit marker
        run: |
          marker="$TARGET_DIR/.upstream-sha"
          if [[ -f "$marker" ]]; then
            origin_sha=$(cat "$marker")
            echo "Found marker: $origin_sha"
          else
            origin_sha=""
            echo "No marker found; first build."
          fi
          echo "ORIGIN_SHA=$origin_sha" >> $GITHUB_ENV

      - name: Decide whether to build
        run: |
          if [[ "${{ inputs.force-build }}" == "true" ]]; then
            echo "Force build requested."
            echo "build=true" >> $GITHUB_ENV
          elif [[ "$UPSTREAM_SHA" != "$ORIGIN_SHA" ]]; then
            echo "Upstream moved (${ORIGIN_SHA:-none} -> $UPSTREAM_SHA). Building."
            echo "build=true" >> $GITHUB_ENV
          else
            echo "Up to date at $UPSTREAM_SHA. Skipping."
            echo "build=false" >> $GITHUB_ENV
          fi

      - name: Build port
        if: env.build == 'true'
        run: |
          chmod +x buildtools/build_port.sh
          ./buildtools/build_port.sh "$PORT_DIR"

      - name: Upload force-build artifact
        if: env.build == 'true' && inputs.force-build == true
        uses: actions/upload-artifact@v4
        with:
          name: sonic-mania-${{ env.UPSTREAM_SHORT }}
          path: |
            ${{ env.PORT_DIR }}/sonicmania
            ${{ env.PORT_DIR }}/Game.so
            ${{ env.PORT_DIR }}/libs
          retention-days: 14

      - name: Sync artifacts into port payload
        if: env.build == 'true' && inputs.force-build != true
        run: |
          mkdir -p "$TARGET_DIR"
          rm -rf "$TARGET_DIR/libs"
          cp "$PORT_DIR/sonicmania" "$TARGET_DIR/sonicmania"
          cp "$PORT_DIR/Game.so" "$TARGET_DIR/Game.so"
          cp -r "$PORT_DIR/libs" "$TARGET_DIR/libs"
          echo "$UPSTREAM_SHA" > "$TARGET_DIR/.upstream-sha"

      - name: Commit port update
        if: env.build == 'true' && inputs.force-build != true
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "$TARGET_DIR"
          if git diff --staged --quiet; then
            echo "No port-payload changes to commit"
          else
            git commit -m "[SONICMANIA] Update to ${UPSTREAM_SHORT}"
            git push
          fi
